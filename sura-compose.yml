services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    networks:
      - ai-net
    volumes:
      - ai_data:/var/lib/mysql
    environment:

      MYSQL_ROOT_PASSWORD: TEST@123
      MYSQL_DATABASE: bankappdb

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pTest@123"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  bankapp:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    container_name: Ai-bank
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb
      MYSQL_USER: root
      MYSQL_PASSWORD: TEST@123
  
    depends_on:
      mysql:
        condition: service_healthy

networks:
  ai-net:
    driver: bridge
volumes:
  ai_data: {}

