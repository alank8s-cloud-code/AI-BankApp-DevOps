services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Test@123
      MYSQL_DATABASE: bankappdb
    restart: unless-stopped
    ports:
      - "3306:3306"
    networks:
      - ai-net
    volumes:
      - ai_data:/var/lib/mysql

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  ollama:
    image: mrsuraj542/ollama-model:v1
    container_name: bankapp-ollama
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  ollama-pull-model:
    image: mrsuraj542/ollama-model:v1
    container_name: ollama-pull-model
    environment:
      - OLLAMA_HOST=ollama
    volumes:
      - ollama-data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/bash
    command: -c  "echo start && ollama pull tinyllama && echo done"
    networks:
      - ai-net

  bankapp:
    image: "${DOCKERHUB_USER}/ai-bankapp:${DOCKER_TAG}"
    container_name: Ai-bank
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb
      MYSQL_USER: root
      MYSQL_PASSWORD: Test@123
      OLLAMA_URL: http://ollama:11434
    networks:
      - ai-net
    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy
      ollama-pull-model:
        condition: service_completed_successfully

networks:
  ai-net:
    driver: bridge

volumes:
  ai_data: {}
  ollama-data: {}
